services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lams
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lams_secret_2024}
      POSTGRES_DB: lams
    ports:
      - "${DB_PORT:-5433}:5432"  # ホストの5433 → コンテナの5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lams"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6380}:6379"  # ホストの6380 → コンテナの6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # LiveKit Server（Phase 3 C1：WebRTC SFU / Gateway）
  # ===========================================
  # WS を廃止し WebRTC/LiveKit へ一本化。フロント/Agent はここへ接続する。
  # API キーは LIVEKIT_KEYS（.env 由来）で注入し、非秘密設定は livekit.yaml に置く。
  livekit:
    image: livekit/livekit-server:v1.8
    command: --config /etc/livekit.yaml
    environment:
      # "APIキー: シークレット" 形式（livekit.yaml には秘密を書かない）
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret_change_in_production}"
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"          # シグナリング（WS/HTTP）
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"  # WebRTC over TCP フォールバック
      - "50000-50019:50000-50019/udp"         # メディア UDP（livekit.yaml と一致）
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped

  # ===========================================
  # coturn（STUN / TURN：NAT 越えリレー）
  # ===========================================
  # README §セキュリティ: 本番の NAT 越えは coturn が担当。LAN/緩い NAT では
  # LiveKit の直結 UDP で足りるが、厳格 NAT 向けにリレーを提供する。
  coturn:
    image: coturn/coturn:4.6
    command: >
      -n --log-file=stdout --simple-log
      --listening-port=3478
      --realm=lams --fingerprint
      --use-auth-secret
      --static-auth-secret=${LIVEKIT_API_SECRET:-devsecret_change_in_production}
      --min-port=50020 --max-port=50039
      --no-tls --no-dtls
    ports:
      - "${TURN_PORT:-3478}:3478"
      - "${TURN_PORT:-3478}:3478/udp"
      - "50020-50039:50020-50039/udp"         # TURN リレー UDP 範囲
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # データベース・キャッシュ
      - DATABASE_URL=postgresql://lams:${DB_PASSWORD:-lams_secret_2024}@postgres:5432/lams
      - REDIS_URL=redis://redis:6379/0
      # 認証
      - JWT_SECRET=${JWT_SECRET:-lams-jwt-secret-change-in-production}
      # AIプロバイダー設定
      - AI_PROVIDER=${AI_PROVIDER:-gpt4o_transcribe}
      # Gemini設定
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-models/gemini-2.5-flash-native-audio-preview-12-2025}
      # Gemini Live S2S 翻訳モデル（AI_PROVIDER=gemini_live 時に使用）
      - GEMINI_LIVE_MODEL=${GEMINI_LIVE_MODEL:-models/gemini-3.5-live-translate-preview}
      # OpenAI Realtime設定
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_REALTIME_MODEL=${OPENAI_REALTIME_MODEL:-gpt-realtime-2025-08-28}
      # LiveKit / WebRTC 設定（Phase 3 C1：単一トランスポート）
      # LIVEKIT_URL: サーバ→LiveKit の内部接続先（同一ネットワーク内のサービス名）
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://livekit:7880}
      # LIVEKIT_WS_URL: フロントへ返す公開 URL（HOST_IP 経由で到達可能なもの）
      - LIVEKIT_WS_URL=${LIVEKIT_WS_URL:-ws://${HOST_IP:-localhost}:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecret_change_in_production}
      - LIVEKIT_AGENT_NAME=${LIVEKIT_AGENT_NAME:-}
      # トークン発行時にバックエンド内で Agent worker を自動起動するか（既定 false）
      - LIVEKIT_AGENT_AUTOSTART=${LIVEKIT_AGENT_AUTOSTART:-false}
      # CORS用ホストIP（前後端で共有）
      - HOST_IP=${HOST_IP:-localhost}
      # フロントエンドポート（CORS許可オリジン自動生成用。.envのFRONTEND_PORTから注入）
      - FRONTEND_PORT=${FRONTEND_PORT:-5273}
    ports:
      # ホスト側ポートは .env の BACKEND_PORT で変更可。コンテナ内部は8000固定
      - "${BACKEND_PORT:-8090}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
    # コンテナ内部ポートは8000固定（外部ポートはdocker-compose.ymlのportsで変換）
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    environment:
      # LAN公開: .envのHOST_IPを設定するだけで自動反映
      # BACKEND_PORTも.envで変更すればVITE_API_URL/WS_URLに自動反映
      - VITE_API_URL=http://${HOST_IP:-localhost}:${BACKEND_PORT:-8090}
      - VITE_WS_URL=ws://${HOST_IP:-localhost}:${BACKEND_PORT:-8090}
      # コンテナ内部ポートは5173固定（外部ポートはdocker-compose.ymlのportsで変換）
      - VITE_PORT=5173
    ports:
      # ホスト側ポートは .env の FRONTEND_PORT で変更可。コンテナ内部は5173固定
      - "${FRONTEND_PORT:-5273}:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
