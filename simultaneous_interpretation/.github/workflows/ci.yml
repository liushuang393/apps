name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Runtime and Electron lint
        run: npm run lint:runtime && npm run lint:electron
      - name: Format check
        run: npm run format:check
      - name: Unit and integration tests
        run: npm test -- --runInBand
      - name: Runtime and Electron coverage gate
        run: npm run test:runtime:coverage
      - name: Chrome extension checks
        run: npm run check:extension

  windows-package:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Build installer and portable package
        run: npm run dist:win
      - name: Packaged smoke test
        run: npm run smoke:packaged
      - name: Verify packaged contents
        shell: pwsh
        run: |
          $entries = npx asar list "release/win-unpacked/resources/app.asar"
          if ($entries | Where-Object { $_ -match '(^|\\)(\.env($|\.)|.*\.db$|.*\.log$)' }) {
            throw 'Forbidden local data was packaged'
          }
          if (!(Test-Path "release/win-unpacked/resources/app.asar.unpacked/node_modules/better-sqlite3/build/Release/better_sqlite3.node")) {
            throw 'better-sqlite3 was not unpacked'
          }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            release/VoiceTranslate Pro Setup *.exe
            release/VoiceTranslate Pro *.exe

  other-platform-builds:
    needs: quality
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Build unpacked application
        run: npm run pack
